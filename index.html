<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>EQLive Web-OBS for iPad</title>
    <style>
        /* OBS風のダークテーマUI */
        body { background-color: #202225; color: #ffffff; font-family: sans-serif; margin: 0; padding: 10px; }
        .container { display: flex; gap: 10px; }
        .preview-box { flex: 2; background: #000; position: relative; }
        #previewCanvas { width: 100%; aspect-ratio: 16/9; background: #000; }
        .control-panel { flex: 1; background: #2f3136; padding: 15px; border-radius: 5px; }
        .btn { background: #4f545c; color: #fff; border: none; padding: 10px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-stream { background: #ed4245; }
    </style>
</head>
<body>

<div id="auth-section">
    <button class="btn" onclick="handleAuthClick()">Googleアカウントと連携（YouTube）</button>
</div>

<div class="container">
    <div class="preview-box">
        <canvas id="previewCanvas" width="1920" height="1080"></canvas>
    </div>

    <div class="control-panel">
        <h3>配信コントロール</h3>
        <button class="btn btn-stream" id="startBtn" onclick="toggleStreaming()">配信開始</button>
        
        <h3>ソース (OBS風)</h3>
        <ul>
            <li>ブラウザソース: EQLive HTML（表示中）</li>
            <li>音声ソース: バックグラウンドBGM</li>
        </ul>

        <h3>ミキサー</h3>
        <label>BGM音量: <input type="range" id="bgmVol" min="0" max="1" step="0.1" value="0.5"></label>
    </div>
</div>

<iframe id="eqliveSource" src="https://gensai-lab.studio.site/eqlive" style="display:none;"></iframe>

<script>
let stream, mediaRecorder;
const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d');
const iframe = document.getElementById('eqliveSource');

// 1. 画面の合成（Canvas APIでOBSのレイアウトを作る）
function drawCanvas() {
    // 背景をクリア
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // TODO: ここでEQLiveのHTML要素やグラフィックを描画
    // ※iframeの直接描画はセキュリティ制限(CORS)があるため、
    // 実際にはEQLiveのパーツ（文字や画像）をこのJS内で同じAPI等から取得してCanvasに直接描くロジックにします。
    ctx.fillStyle = '#ffffff';
    ctx.font = '48px Arial';
    ctx.fillText("EQLive 配信シミュレーション画面", 100, 100);

    requestAnimationFrame(drawCanvas);
}
drawCanvas();

// 2. 音声の合成（Web Audio APIでBGMとシステム音をミックス）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioDestination = audioCtx.createMediaStreamDestination();

// BGMソースの作成
const bgm = new Audio('your-bgm-file.mp3'); // 著作権フリーBGMのURL
bgm.loop = true;
const bgmSource = audioCtx.createMediaElementSource(bgm);
const bgmGain = audioCtx.createGain();
bgmSource.connect(bgmGain);
bgmGain.connect(audioDestination);

// 音量調整の連動
document.getElementById('bgmVol').addEventListener('input', (e) => {
    bgmGain.gain.value = e.target.value;
});

// 3. WebRTC（WHIP）によるYouTubeへの配信処理
async function toggleStreaming() {
    bgm.play(); // BGM開始
    
    // Canvasの映像ストリームと、Web Audioの音声ストリームを合流
    const videoStream = canvas.captureStream(30); // 30fps
    const audioTrack = audioDestination.stream.getAudioTracks()[0];
    videoStream.addTrack(audioTrack);
    
    stream = videoStream;

    // YouTubeのWHIPエンドポイント（API連携で取得したURL）へWebRTC接続を確立
    // (ここにPeerConnectionとWHIPのシグナリング処理を実装します)
    alert("YouTubeへのWebRTC(WHIP)配信ストリームを開始しました（擬似）");
}

// 4. Google API / YouTube連携（概要）
function handleAuthClick() {
    // Google OAuth2.0でログインし、ユーザーのYouTubeアカウントの権限（Scope: youtube.broadcast）を取得。
    // ログイン成功後、YouTube Data APIを使用して「今すぐ配信」のストリームキーやWHIP URLを自動取得します。
    alert("Googleアカウント連携が完了しました。チャンネル情報を読み込みます。");
}
</script>
</body>
</html>
