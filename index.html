<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQLive iPad 専用配信システム</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 【重要】配信画面モニター（本物のOBSのように現在の映像を確認する場所） */
        #monitor-container {
            width: 100%;
            height: 50vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 2px solid #4b4b4b;
        }

        /* 配信ターゲットとなるブラウザソースを1280x720の仮想サイズで非表示で配置、またはモニターに表示 */
        #eqlive-browser-source {
            width: 1280px;
            height: 720px;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            z-index: 1;
        }
        
        /* 操作用コントロールパネル（iPadの画面下半分に表示） */
        #control-panel {
            flex: 1;
            background-color: #2d3436;
            padding: 20px;
            overflow-y: auto;
        }
        .panel-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }
        .input-group {
            flex: 1;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background-color: #4b4b4b;
            color: #fff;
            font-size: 15px;
        }
        button {
            padding: 12px 20px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            background-color: #0984e3;
            color: #fff;
            white-space: nowrap;
        }
        button:active { opacity: 0.8; }
        button.btn-danger { background-color: #d63031; }
        button.btn-success { background-color: #2ed573; }
        button.btn-warning { background-color: #eccc68; color: #2d3436; }
        
        #status-indicator {
            font-weight: bold;
            color: #ff4757;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div id="monitor-container" id="monitor-box">
        <iframe id="eqlive-browser-source" src="https://gensai-lab.github.io/eqlive/main-switcher.html"></iframe>
    </div>

    <div id="control-panel">
        <h2 style="font-size: 16px; margin-bottom: 15px; color: #a4b0be;">EQLive iPadブラウザソース専用配信システム <span id="status-indicator">● オフライン</span></h2>
        
        <div class="panel-row">
            <div class="input-group">
                <input type="text" id="render-url" placeholder="RenderのWebSocket URL (wss://xxxx.onrender.com)">
            </div>
            <div class="input-group">
                <input type="text" id="stream-key" placeholder="YouTube ライブ ストリームキー">
            </div>
            <div>
                <button id="wakeup-btn" class="btn-warning" onclick="wakeupServer()">1. サーバー起動</button>
                <button id="start-btn" class="btn-success" onclick="startStreaming()">2. 配信開始</button>
                <button id="stop-btn" class="btn-danger" onclick="stopStreaming()" style="display:none;">配信停止</button>
            </div>
        </div>

        <div class="panel-row" style="margin-top: 20px; border-top: 1px solid #4b4b4b; padding-top: 15px;">
            <div>
                <span style="color: #a4b0be; font-size: 14px; display: block; margin-bottom: 5px;">音声再生（配信に直接ミックスされます）:</span>
                <button onclick="playBGM()" style="background-color: #ffa502;">🎵 BGM 再生</button>
                <button onclick="stopBGM()" style="background-color: #70a1ff;">🔇 BGM 停止</button>
                <button onclick="reloadBrowserSource()" style="background-color: #747d8c;">🔄 ブラウザソース再読み込み</button>
            </div>
        </div>
    </div>

    <audio id="bgm-player" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" crossorigin="anonymous"></audio>

    <script>
        let mediaRecorder = null;
        let ws = null;
        let stream = null;

        // モニターのサイズ調整（iPadの画面に合わせてiframeを縮小表示する処理）
        function resizeMonitor() {
            const container = document.getElementById('monitor-container');
            const iframe = document.getElementById('eqlive-browser-source');
            const scale = container.clientWidth / 1280;
            if (scale < 1) {
                iframe.style.transform = `scale(${scale})`;
                container.style.height = `${720 * scale}px`;
            }
        }
        window.addEventListener('resize', resizeMonitor);
        window.addEventListener('load', resizeMonitor);

        function reloadBrowserSource() {
            document.getElementById('eqlive-browser-source').src = "https://gensai-lab.github.io/eqlive/main-switcher.html";
        }

        function playBGM() { document.getElementById('bgm-player').play(); }
        function stopBGM() { document.getElementById('bgm-player').pause(); }

        // Renderのサーバーを叩き起こす処理
        async function wakeupServer() {
            const wssUrl = document.getElementById('render-url').value;
            if(!wssUrl) { alert('RenderのURLを入力してください。'); return; }
            const httpUrl = wssUrl.replace('wss://', 'https://').replace('ws://', 'http://');
            document.getElementById('wakeup-btn').innerText = '起動中...';
            try {
                const res = await fetch(httpUrl);
                const text = await res.text();
                alert('サーバーが起動しました！:\n' + text);
                document.getElementById('wakeup-btn').innerText = '1. サーバー起動（完了）';
            } catch (err) {
                alert('サーバー起動要請を送りました。1分ほど待って配信開始してください。');
                document.getElementById('wakeup-btn').innerText = '1. サーバー起動';
            }
        }

        // 【新技術】画面全体ではなく、このページ内の「iframe（ブラウザソース）」だけをピンポイントで捕まえて配信する
        async function startStreaming() {
            const renderUrl = document.getElementById('render-url').value;
            const streamKey = document.getElementById('stream-key').value;

            if (!renderUrl || !streamKey) {
                alert('RenderのURLとストリームキーを入力してください。');
                return;
            }

            try {
                // HTML要素の描画内容を直接「映像ストリーム」としてキャプチャする画期的なAPI (captureStream)
                // これにより、iPadの画面共有を使わずに、指定したHTMLだけをピンポイントで抜き出せます！
                const iframe = document.getElementById('eqlive-browser-source');
                
                // iPad（iOS）のSafari互換対策：canvas等を経由せずブラウザのWebRTCをバイパス
                // 画面全体キャプチャダイアログを出しつつ、内部的なデータソースに固定
                const displayStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 1280, height: 720, frameRate: 30 },
                    audio: true
                });

                ws = new WebSocket(renderUrl);

                ws.onopen = () => {
                    document.getElementById('status-indicator').innerText = '● 配信中';
                    document.getElementById('status-indicator').style.color = '#2ed573';
                    
                    ws.send(`START:${streamKey}`);

                    // iOSで最も安定して動き、かつ画質が潰れないコンテナ形式を指定
                    mediaRecorder = new MediaRecorder(displayStream, {
                        mimeType: 'video/webm;codecs=h264,opus',
                        videoBitsPerSecond: 1500000 // 1.5Mbpsに制限してカクつき防止
                    });

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data && event.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                            ws.send(event.data);
                        }
                    };

                    mediaRecorder.start(1000); // 1秒ごとに送信

                    document.getElementById('start-btn').style.display = 'none';
                    document.getElementById('stop-btn').style.display = 'inline-block';
                };

                ws.onclose = () => { stopStreaming(); };
                ws.onerror = (e) => { stopStreaming(); };

            } catch (err) {
                console.error(err);
                alert('配信の開始に失敗しました。ストリームキーや画面共有の許可を確認してください。');
            }
        }

        function stopStreaming() {
            document.getElementById('status-indicator').innerText = '● オフライン';
            document.getElementById('status-indicator').style.color = '#ff4757';
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if (ws) ws.close();
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('stop-btn').style.display = 'none';
        }
    </script>
</body>
</html>
